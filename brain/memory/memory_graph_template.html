<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆图谱可视化</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px;
            text-align: center;
        }
        
        .container {
            display: flex;
            height: calc(100vh - 50px);
        }
        
        .sidebar {
            width: 280px;
            background: white;
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        
        .menu-bar {
            flex: 1;
            position: relative;
        }
        
        #graph-container {
            width: 100%;
            height: 100%;
            background: white;
        }
        
        .stat-card {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 3px solid #667eea;
        }
        
        .stat-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .node-details {
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid #e0e0e0;
            display: none;
        }
        
        .detail-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .detail-title .close-detail-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .detail-title .close-detail-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }
        
        .property-item {
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .property-key {
            font-weight: bold;
            color: #555;
        }
        
        .property-value {
            color: #777;
            margin-left: 10px;
        }
        
        .node {
            cursor: pointer;
        }
        
        .node:hover {
            stroke: #333 !important;
            stroke-width: 4px !important;
        }
        
        .link {
            /* stroke颜色由JavaScript动态设置，不在CSS中固定 */
            stroke-opacity: 0.5;
            stroke-width: 2px;
        }
        
        .link:hover {
            /* hover时加粗显示，保持原有颜色 */
            stroke-opacity: 0.8;
            stroke-width: 2px;
        }
        
        .node-label {
            font-size: 11px;
            text-anchor: middle;
            pointer-events: none;
            fill: #333;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        
        .link-label {
            font-size: 10px;
            text-anchor: middle;
            pointer-events: none;
            fill: #666;
            font-style: italic;
            background: rgba(255,255,255,0.8);
        }
        
        .controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .control-button {
            margin: 2px;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .zoom-controls {
            background: #667eea;
            color: white;
        }
        
        .filter-controls {
            background: #28a745;
            color: white;
        }
        
        .edit-controls {
            background: #6f42c1;
            color: white;
        }

        .memory-controls {
            background: #17a2b8;
            color: white;
        }

        .memory-controls:hover {
            background: #138496;
        }
        
        .refresh-controls {
            background: #fd7e14;
            color: white;
        }
        
        .refresh-controls:hover {
            background: #e8590c;
        }
        
        .edit-controls:disabled {
            background: #cccccc;
            color: #666666;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .legend {
            position: absolute;
            top: 60px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 11px;
            max-width: 120px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        /* 记忆存取面板样式 */
        .memory-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.3);
            z-index: 1001;
            transition: right 0.3s ease;
            overflow-y: auto;
        }

        .memory-panel.show {
            right: 0;
        }

        .memory-panel-header {
            background: #17a2b8;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #117a8b;
        }

        .memory-panel-header h3 {
            margin: 0;
            font-size: 18px;
        }

        .memory-panel-content {
            padding: 20px;
        }

        .memory-buttons-row {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .memory-function-button {
            flex: 1;
            padding: 20px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .memory-function-button:hover {
            border-color: #17a2b8;
            background: #f0fbfd;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(23, 162, 184, 0.2);
        }

        .memory-function-button:disabled {
            background: #f5f5f5;
            color: #cccccc;
            border-color: #e0e0e0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .memory-function-button:disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .memory-function-button .button-icon {
            font-size: 28px;
        }

        .memory-function-button .button-text {
            font-weight: 600;
            font-size: 13px;
        }

        .memory-forms {
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
            margin-top: 10px;
        }

        /* 节点编辑面板样式 */
        .edit-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: right 0.3s ease;
            overflow-y: auto;
        }
        
        .edit-panel.show {
            right: 0;
        }
        
        /* 节点创建模式下的样式 */
        .creating-node {
            cursor: crosshair !important;
        }
        
        .creating-node .graph-container {
            cursor: crosshair !important;
        }
        
        .edit-panel-header {
            background: #6f42c1;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #5a2d91;
        }
        
        .edit-panel-header h3 {
            margin: 0;
            font-size: 18px;
        }
        
        .close-button {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-button:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .edit-panel-content {
            padding: 20px;
        }
        
        .edit-buttons-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .edit-function-button {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            font-size: 12px;
            min-width: 0;
        }
        
        .edit-function-button:hover {
            border-color: #6f42c1;
            background: #f8f6ff;
            transform: translateY(-1px);
        }
        
        .edit-function-button.active {
            border-color: #6f42c1;
            background: #6f42c1;
            color: white;
        }
        
        .edit-function-button:disabled {
            background: #f5f5f5;
            color: #cccccc;
            border-color: #e0e0e0;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .edit-function-button:disabled:hover {
            background: #f5f5f5;
            border-color: #e0e0e0;
            transform: none;
        }
        
        .button-icon {
            font-size: 16px;
        }
        
        .button-text {
            font-weight: 500;
            font-size: 11px;
            text-align: center;
            white-space: nowrap;
        }
        
        .edit-forms {
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
            margin-top: 20px;
        }
        
        .edit-form {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .edit-form h4 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
            font-size: 13px;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #6f42c1;
            box-shadow: 0 0 0 2px rgba(111, 66, 193, 0.1);
        }
        
        .warning-text {
            color: #dc3545;
            font-size: 13px;
            margin: 0;
            padding: 10px;
            background: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 4px;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .action-btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .confirm-btn, .primary-btn {
            background: #28a745;
            color: white;
        }
        
        .confirm-btn:hover, .primary-btn:hover {
            background: #218838;
        }
        
        .danger-btn {
            background: #dc3545;
            color: white;
        }
        
        .danger-btn:hover {
            background: #c82333;
        }
        
        .cancel-btn {
            background: #6c757d;
            color: white;
        }
        
        .cancel-btn:hover {
            background: #5a6268;
        }
        
        /* 节点类型选择按钮样式 */
        .node-type-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        .node-type-button {
            flex: 1;
            padding: 15px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            min-width: 0;
        }
        
        .node-type-button:hover {
            border-color: #4CAF50;
            background: #f8fff8;
            transform: translateY(-1px);
        }
        
        .node-type-button.selected {
            border-color: #4CAF50;
            background: #4CAF50;
            color: white;
        }
        
        .node-type-icon {
            font-size: 20px;
        }
        
        .node-type-text {
            font-weight: 500;
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
        }
        
        /* 时间节点表单样式 */
        .time-node-form {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .time-node-form h4 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 16px;
        }
        
        /* 实体节点表单样式 */
        .entity-node-form {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .entity-node-form h4 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 16px;
        }
        
        /* 角色节点表单样式 */
        .character-node-form {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .character-node-form h4 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 16px;
        }
        
        /* 地点节点表单样式 */
        .location-node-form {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .location-node-form h4 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        
        .time-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .time-input:focus {
            border-color: #4CAF50;
            outline: none;
        }
        
        .time-format-help {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
        }
        
        .time-format-help ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
        
        .time-format-help li {
            margin: 2px 0;
        }
        
        .form-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }
        
        .create-btn, .cancel-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .create-btn {
            background: #4CAF50;
            color: white;
        }
        
        .create-btn:hover {
            background: #45a049;
        }
        
        .create-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 心智云图</h1>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="stat-card">
                <div class="stat-title">📊 图谱统计</div>
                <div class="stat-item">
                    <span>节点总数:</span>
                    <span id="total-nodes">-</span>
                </div>
                <div class="stat-item">
                    <span>关系总数:</span>
                    <span id="total-links">-</span>
                </div>
                <div class="stat-item">
                    <span>更新时间:</span>
                    <span id="updated-time">-</span>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-title">🏷️ 节点类型</div>
                <div id="node-types"></div>
            </div>
            
            <div class="node-details" id="node-details">
                <div class="detail-title" id="detail-title">
                    <span>节点详情</span>
                    <button class="close-detail-btn" onclick="closeNodeDetails()">×</button>
                </div>
                <div id="node-properties"></div>
            </div>
        </div>
        
        <div class="menu-bar">
            <svg id="graph-container"></svg>
            
            <div class="controls">
                <button class="control-button" onclick="triggerMemoryDecay()" style="background: #ff9800; color: white;">🧹 测试遗忘</button>
                <button class="control-button refresh-controls" onclick="smartRefresh()">🔄 刷新</button>
                <button class="control-button zoom-controls" onclick="resetZoom()">页面重置</button>
                <button class="control-button memory-controls" onclick="toggleMemoryPanel()">记忆存取</button>
                <button class="control-button edit-controls" id="edit-button">节点编辑</button>
            </div>
            
            <div class="legend">
                <div style="font-weight: bold; margin-bottom: 6px; border-bottom: 1px solid #ccc; padding-bottom: 2px; font-size: 10px;">节点类型</div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #FF9800; width: 10px; height: 10px; margin-right: 6px;"></div>
                    <span style="font-size: 10px;">地点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #2196F3; width: 10px; height: 10px; margin-right: 6px;"></div>
                    <span style="font-size: 10px;">角色</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #FFD700; width: 10px; height: 10px; margin-right: 6px;"></div>
                    <span style="font-size: 10px;">实体</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #4CAF50; width: 10px; height: 10px; margin-right: 6px;"></div>
                    <span style="font-size: 10px;">时间</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #9E9E9E; width: 10px; height: 10px; margin-right: 6px;"></div>
                    <span style="font-size: 10px;">其他</span>
                </div>
            </div>
        </div>
        
        <!-- 记忆存取面板 -->
        <div class="memory-panel" id="memory-panel">
            <div class="memory-panel-header">
                <h3>📦 记忆存取</h3>
                <button class="close-button" onclick="toggleMemoryPanel()">×</button>
            </div>
            <div class="memory-panel-content">
                <div class="memory-buttons-row">
                    <button class="memory-function-button" onclick="saveMemorySnapshot()">
                        <span class="button-icon">💾</span>
                        <span class="button-text">保存记忆快照</span>
                    </button>
                    <button class="memory-function-button" onclick="loadMemorySnapshot()">
                        <span class="button-icon">📂</span>
                        <span class="button-text">读取记忆快照</span>
                    </button>
                </div>
            </div>
            <div class="memory-forms"></div>
        </div>

        <!-- 节点编辑面板 -->
        <div class="edit-panel" id="edit-panel">
            <div class="edit-panel-header">
                <h3>节点编辑</h3>
                <button class="close-button" onclick="toggleEditPanel()">×</button>
            </div>
            <div class="edit-panel-content">
                <div class="edit-buttons-row">
                    <button class="edit-function-button add-node-btn" onclick="showAddNodeForm()">
                        <span class="button-icon">➕</span>
                        <span class="button-text">添加</span>
                    </button>
                    <button class="edit-function-button modify-node-btn" onclick="showModifyNodeForm()">
                        <span class="button-icon">✏️</span>
                        <span class="button-text">编辑</span>
                    </button>
                    <button class="edit-function-button link-node-btn" onclick="showLinkNodeForm()">
                        <span class="button-icon">🔗</span>
                        <span class="button-text">链接</span>
                    </button>
                    <button class="edit-function-button delete-node-btn" onclick="showDeleteNodeForm()">
                        <span class="button-icon">🗑️</span>
                        <span class="button-text">删除</span>
                    </button>
                    <button class="edit-function-button save-btn" onclick="showSaveForm()">
                        <span class="button-icon">🌐</span>
                        <span class="button-text">合并</span>
                    </button>
                </div>
            </div>
            
            <!-- 功能表单区域 -->
            <div class="edit-forms">
            </div>
        </div>
    </div>

    <script>
        // 全局颜色常量
        const LINK_COLOR = '#27ae60';   // 关系线条颜色（绿色）
        const NODE_STROKE_COLOR = '#00FF00';  // 节点描边颜色
        const NODE_STROKE_WIDTH = 3;
        
        // 排除在编辑表单中显示和收集的系统属性
        const EXCLUDED_PROPERTIES = ['name', 'created_at', 'last_updated', 'node_type'];
        
        // 图谱数据占位符
        const graphData = {{GRAPH_DATA}};
        
        // 全局变量跟踪最近选中的项目列表（节点和关系），最多保留10个
        let recentSelectedNodes = [];
        
        // 删除模式状态变量
        let deleteMode = false;
        
        // 保存模式状态变量
        let saveMode = false;
        
        // 标签可见性状态变量

        // 检测双向关系并设置偏移
        function detectBidirectionalLinks(links) {
            const linkPairs = new Map();
            
            // 为每个连接创建标识符，检测双向关系
            links.forEach((link, index) => {
                const sourceId = link.source.id || link.source;
                const targetId = link.target.id || link.target;
                const pairKey1 = `${sourceId}-${targetId}`;
                const pairKey2 = `${targetId}-${sourceId}`;
                
                // 检查是否已经有反向连接
                if (linkPairs.has(pairKey2)) {
                    // 发现双向关系
                    const reverseLink = linkPairs.get(pairKey2);
                    
                    // 设置偏移标识
                    link.isBidirectional = true;
                    link.offsetDirection = 1; // 正偏移
                    reverseLink.isBidirectional = true;
                    reverseLink.offsetDirection = 1; // 负偏移
                    
                    console.log('检测到双向关系:', sourceId, '<->', targetId);
                } else {
                    linkPairs.set(pairKey1, link);
                    link.isBidirectional = false;
                    link.offsetDirection = 0; // 无偏移
                }
            });
            
            return links;
        }
        
        // 计算偏移后的连线位置
        function calculateOffsetPosition(source, target, offset = 10, direction = 0) {
            if (direction === 0) {
                // 无偏移，返回原始位置
                return { x1: source.x, y1: source.y, x2: target.x, y2: target.y };
            }
            
            // 计算连线的垂直向量用于偏移
            const dx = target.x - source.x;
            const dy = target.y - source.y;
            const length = Math.sqrt(dx * dx + dy * dy);
            
            if (length === 0) {
                return { x1: source.x, y1: source.y, x2: target.x, y2: target.y };
            }
            
            // 垂直向量（逆时针旋转90度）
            const perpX = -dy / length * offset * direction;
            const perpY = dx / length * offset * direction;
            
            return {
                x1: source.x + perpX,
                y1: source.y + perpY,
                x2: target.x + perpX,
                y2: target.y + perpY
            };
        }
        
        // 处理双向关系
        detectBidirectionalLinks(graphData.links);
        
        // 创建链接
        let link = container.append("g")

            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));
        
        // 创建节点标签（显示在节点上）
        let nodeLabels = container.append("g")
            .selectAll("text")
            .data(graphData.nodes)
            .enter().append("text")
            .attr("class", "node-label")
            .text(d => d.label.length > 8 ? d.label.substring(0, 8) + "..." : d.label)
            .style("display", "block");
        
        // 创建关系标签背景
        let linkLabelBgs = container.append("g")
            .selectAll("rect")
            .data(graphData.links)
            .enter().append("rect")
            .attr("class", "link-label-bg")
            .attr("fill", "rgba(255,255,255,0.8)")

        // 创建关系标签（显示在连接线上）
        let linkLabels = container.append("g")
            .selectAll("text")
            .data(graphData.links)
            .enter().append("text")
            .attr("class", "link-label")

                // 显示关系类型：优先显示predicate > action > type
                if (d.properties && d.properties.predicate) {

                }

        // 更新位置
        simulation.on("tick", () => {
            // 更新连线位置（支持双向关系偏移）
            link.each(function(d) {
                const offset = d.isBidirectional ? calculateOffsetPosition(d.source, d.target, 8, d.offsetDirection) : 
                              { x1: d.source.x, y1: d.source.y, x2: d.target.x, y2: d.target.y };
                
                d3.select(this)
                    .attr("x1", offset.x1)
                    .attr("y1", offset.y1)
                    .attr("x2", offset.x2)
                    .attr("y2", offset.y2);
            });
            
            node
                .attr("cx", d => d.x)

            // 节点标签跟随节点
            nodeLabels
                .attr("x", d => d.x)
                .attr("y", d => d.y + 4); // 稍微向下偏移，让文字在节点中心偏下
            
            // 关系标签显示在连接线的中点（支持双向关系偏移）
            linkLabels.each(function(d) {
                let labelX, labelY;
                
                if (d.isBidirectional) {
                    const offset = calculateOffsetPosition(d.source, d.target, 8, d.offsetDirection);
                    labelX = (offset.x1 + offset.x2) / 2;
                    labelY = (offset.y1 + offset.y2) / 2 - 5;
                } else {
                    labelX = (d.source.x + d.target.x) / 2;
                    labelY = (d.source.y + d.target.y) / 2 - 5;
                }
                
                d3.select(this)
                    .attr("x", labelX)
                    .attr("y", labelY);
            });
            
            // 关系标签背景跟随标签位置
            linkLabelBgs.each(function(d) {
                const text = linkLabels.filter(data => data === d).node();
                if (text) {

            });
        });

        // 动态更新图谱数据（无需页面刷新）
        function updateGraphData() {
            console.log('正在动态更新图谱数据...');
            
            return fetch('/api/get_graph_data', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log('图谱数据更新成功:', data.data);
                    
                    // 更新全局数据
                    const newGraphData = data.data;
                    
                    // 保存旧数据以便对比
                    const oldNodesCount = graphData.nodes.length;
                    const oldLinksCount = graphData.links.length;
                    
                    // 更新graphData
                    graphData.nodes = newGraphData.nodes || [];
                    graphData.links = newGraphData.links || [];
                    graphData.stats = newGraphData.stats || graphData.stats;
                    
                    // 更新可视化
                    updateVisualization();
                    
                    // 更新统计信息
                    updateStats(newGraphData.stats);
                    
                    // 显示更新信息
                    const newNodesCount = graphData.nodes.length;
                    const newLinksCount = graphData.links.length;
                    const nodesDiff = newNodesCount - oldNodesCount;
                    const linksDiff = newLinksCount - oldLinksCount;
                    
                    if (nodesDiff !== 0 || linksDiff !== 0) {
                        console.log(`图谱已更新: 节点变化${nodesDiff > 0 ? '+' : ''}${nodesDiff}, 关系变化${linksDiff > 0 ? '+' : ''}${linksDiff}`);
                    }
                    
                    return true;
                } else {
                    console.error('动态更新失败:', data.error);
                    return false;
                }
            })
            .catch(error => {
                console.error('动态更新错误:', error);
                return false;
            });
        }
        
        // 更新统计信息显示
        function updateStats(stats) {
            if (!stats) return;
            
            document.getElementById("total-nodes").textContent = stats.total_nodes || 0;
            document.getElementById("total-links").textContent = stats.total_links || 0;
            document.getElementById("updated-time").textContent = new Date(stats.updated_at).toLocaleString();
            
            // 更新节点类型统计
            const nodeTypesDiv = document.getElementById("node-types");
            let nodeTypesHtml = "";
            for (const [type, count] of Object.entries(stats.node_types || {})) {
                nodeTypesHtml += `
                    <div class="stat-item">
                        <span>${type}:</span>
                        <span>${count}</span>
                    </div>
                `;
            }
            nodeTypesDiv.innerHTML = nodeTypesHtml;
        }
        
        // 测试遗忘（记忆衰退）
        async function triggerMemoryDecay() {
            if (!confirm('确定要执行记忆衰退吗？\n\n所有关系的 significance 值将根据 importance 进行衰减。\n此操作不可撤销。')) {
                return;
            }
            try {
                const response = await fetch('/api/memory_decay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ decay_factor: 0.9 })
                });
                const result = await response.json();
                if (result.success) {
                    alert('记忆衰退已执行！\n' + result.message);
                } else {
                    alert('记忆衰退失败：' + (result.error || '未知错误'));
                }
            } catch (error) {
                console.error('记忆衰退失败:', error);
                alert('记忆衰退请求失败：' + error.message);
            }
        }

        // 智能刷新：优先使用动态更新，失败时使用页面刷新
        function smartRefresh() {
            console.log('执行智能刷新...');
            
            // 显示加载状态
            const refreshBtn = document.querySelector('.refresh-controls');
            const originalText = refreshBtn.innerHTML;
            refreshBtn.innerHTML = '⏳ 更新中...';
            refreshBtn.disabled = true;
            
            // 尝试动态更新
            updateGraphData().then(success => {
                if (success) {
                    // 动态更新成功
                    console.log('动态更新成功');
                    refreshBtn.innerHTML = '✅ 已更新';
                    setTimeout(() => {
                        refreshBtn.innerHTML = originalText;
                        refreshBtn.disabled = false;
                    }, 2000);
                } else {
                    // 动态更新失败，询问是否页面刷新
                    refreshBtn.innerHTML = originalText;
                    refreshBtn.disabled = false;
                    
                    if (confirm('动态更新失败，是否重新加载页面以获取最新数据？\n\n点击"确定"重新加载页面\n点击"取消"保持当前状态')) {
                        refreshData(); // 使用页面刷新
                    }
                }
            }).catch(error => {
                console.error('智能刷新失败:', error);
                refreshBtn.innerHTML = originalText;
                refreshBtn.disabled = false;
                
                if (confirm('图谱更新失败，是否重新加载页面？\n\n点击"确定"重新加载页面\n点击"取消"保持当前状态')) {
                    refreshData(); // 使用页面刷新
                }
            });
        }
        
        // 通知刷新并重新加载页面
        function notifyRefreshAndReload() {
            console.log('数据刷新成功，即将重新加载页面...');
            // 延迟一小段时间后重新加载页面，让用户看到成功消息
            setTimeout(() => {
                location.reload();
            }, 500);
        }
        
        // 刷新数据功能（页面重新加载方式）
        function refreshData() {
            console.log('正在刷新数据...');
            
            // 显示加载状态
            const refreshBtn = document.querySelector('.refresh-controls');
            const originalText = refreshBtn.innerHTML;
            refreshBtn.innerHTML = '⏳ 刷新中...';
            refreshBtn.disabled = true;
            
            fetch('/api/refresh_data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                console.log('刷新结果:', data);
                if (data.success) {
                    // 通知服务器即将刷新，然后重新加载页面
                    notifyRefreshAndReload();
                } else {
                    alert('刷新失败: ' + (data.error || '未知错误'));
                    refreshBtn.innerHTML = originalText;
                    refreshBtn.disabled = false;
                }
            })
            .catch(error => {
                console.error('刷新错误:', error);
                alert('刷新失败: ' + error.message);
                refreshBtn.innerHTML = originalText;
                refreshBtn.disabled = false;
            });
        }

        // 获取选中项目的信息显示文本
        function getSelectedItemInfo() {
            const selectedItem = recentSelectedNodes[0];
            if (!selectedItem) {
                return '无选中项目';
            }
            
            if (selectedItem.type === 'node') {
                const node = selectedItem.data;
                return `
                    <strong>节点：</strong>${node.label}<br>
                    <strong>类型：</strong>${node.labels.join(", ")}<br>
                    <strong>ID：</strong>${node.neo4j_id}
                `;
            } else if (selectedItem.type === 'relationship') {
                const rel = selectedItem.data;
                const sourceNode = graphData.nodes.find(node => node.id === rel.source.id);
                const targetNode = graphData.nodes.find(node => node.id === rel.target.id);
                return `
                    <strong>关系：</strong>${rel.type}<br>
                    <strong>从：</strong>${sourceNode ? sourceNode.label : 'Unknown'}<br>
                    <strong>到：</strong>${targetNode ? targetNode.label : 'Unknown'}<br>
                    <strong>ID：</strong>${rel.neo4j_id}
                `;
            }
            
            return '未知项目类型';
        }
        
        // 获取相关项目数量（仅对节点有意义）
        function getRelatedItemsCount() {
            const selectedItem = recentSelectedNodes[0];
            if (!selectedItem || selectedItem.type !== 'node') {
                return 0;
            }
            
            const nodeId = selectedItem.data.id;
            return graphData.links.filter(link => 
                link.source.id === nodeId || link.target.id === nodeId
            ).length;
        }

        // 更新最近选中的项目列表（节点和关系）
        function updateRecentSelectedNodes(itemData) {
            // 检查参数
            if (!itemData) return;
            
            // 检查是否已经在列表中
            const existingIndex = recentSelectedNodes.findIndex(item => 
                item.elementId === itemData.elementId && item.type === itemData.type);
            
            if (existingIndex !== -1) {
                // 如果已存在，移除后重新添加到最前面
                recentSelectedNodes.splice(existingIndex, 1);
            }
            
            // 添加到列表开头
            recentSelectedNodes.unshift(itemData);
            
            // 只保留最近的10个项目
            if (recentSelectedNodes.length > 10) {
                recentSelectedNodes = recentSelectedNodes.slice(0, 10);
            }
            
            // 如果在删除模式或保存模式下，更新样式
            if (deleteMode || saveMode) {
                updateSelectedItemsStyle();
            }
        }
        
        // 更新选中项目的样式（删除模式下显示红色描边，保存模式下显示橙色描边）
        function updateSelectedItemsStyle() {
            // 重置所有节点的样式
            container.selectAll(".node")
                .attr("stroke", NODE_STROKE_COLOR)
                .attr("stroke-width", NODE_STROKE_WIDTH);
            
            // 重置所有关系的样式
            container.selectAll(".link")
                .attr("stroke", LINK_COLOR)
                .attr("stroke-width", "3");
            
            // 如果在删除模式下，为选中的项目添加红色描边
            if (deleteMode) {
                recentSelectedNodes.forEach(item => {
                    if (item.type === 'node') {
                        // 为选中的节点添加红色描边
                        container.selectAll(".node")
                            .filter(d => d.id === item.data.id)
                            .attr("stroke", "#ff0000")
                            .attr("stroke-width", "4");
                    } else if (item.type === 'relationship') {
                        // 为选中的关系添加红色描边
                        container.selectAll(".link")
                            .filter(d => d.neo4j_id === item.data.neo4j_id)
                            .attr("stroke", "#ff0000")
                            .attr("stroke-width", "4");
                    }
                });
            }
            
            // 如果在保存模式下，为选中的项目添加橙色描边
            if (saveMode) {
                recentSelectedNodes.forEach(item => {
                    if (item.type === 'node') {
                        // 为选中的节点添加橙色描边
                        container.selectAll(".node")
                            .filter(d => d.id === item.data.id)
                            .attr("stroke", "#ff8800")
                            .attr("stroke-width", "4");
                    } else if (item.type === 'relationship') {
                        // 为选中的关系添加橙色描边
                        container.selectAll(".link")
                            .filter(d => d.neo4j_id === item.data.neo4j_id)
                            .attr("stroke", "#ff8800")
                            .attr("stroke-width", "4");
                    }
                });
            }
        }
        
        // 更新删除表单内容
        function updateDeleteFormContent() {
            const editForms = document.querySelector('.edit-forms');
            
            if (recentSelectedNodes.length === 0) {
                // 未选中任何项目
                editForms.innerHTML = `
                    <div class="edit-form">
                        <h4>删除项目</h4>
                        <div class="warning-text">
                            请先点击选中一个或多个节点或关系后再进行删除操作。
                        </div>
                    </div>
                `;
            } else {
                // 计算将要删除的所有项目
                let totalNodeCount = 0;
                let totalRelationshipCount = 0;
                let itemsList = [];
                
                recentSelectedNodes.forEach((item, index) => {
                    if (item.type === 'node') {
                        totalNodeCount += 1;
                        // 计算每个节点的相关关系数量
                        const relatedCount = graphData.links.filter(link => 
                            link.source.id === item.data.id || link.target.id === item.data.id
                        ).length;
                        totalRelationshipCount += relatedCount;
                        itemsList.push(`<strong>节点${index + 1}:</strong> ${item.data.label} (节点, 将删除${relatedCount}个关系)`);
                    } else if (item.type === 'relationship') {
                        totalRelationshipCount += 1;
                        const sourceNode = graphData.nodes.find(node => node.id === item.data.source.id);
                        const targetNode = graphData.nodes.find(node => node.id === item.data.target.id);
                        itemsList.push(`<strong>关系${index + 1}:</strong> ${item.data.type} (从 "${sourceNode ? sourceNode.label : 'Unknown'}" 到 "${targetNode ? targetNode.label : 'Unknown'}")`);
                    }
                });
                
                let warningText = '';
                if (totalNodeCount > 0 && totalRelationshipCount > 0) {
                    warningText = `
                        <div class="warning-text">
                            警告：此次操作将删除 ${totalNodeCount} 个节点和 ${totalRelationshipCount} 个关系！
                        </div>
                    `;
                } else if (totalNodeCount > 0) {
                    warningText = `
                        <div class="warning-text">
                            警告：此次操作将删除 ${totalNodeCount} 个节点和其相关的 ${totalRelationshipCount} 个关系！
                        </div>
                    `;
                } else if (totalRelationshipCount > 0) {
                    warningText = `
                        <div class="warning-text">
                            警告：此次操作将删除 ${totalRelationshipCount} 个关系！
                        </div>
                    `;
                }
                
                editForms.innerHTML = `
                    <div class="edit-form">
                        <h4>即将删除 (共${recentSelectedNodes.length}个项目)</h4>
                        <div class="form-group">
                            <label>选中的项目列表：</label>
                            <div style="padding: 8px; background: #f8f9fa; border-radius: 4px; margin-top: 5px; max-height: 200px; overflow-y: auto;">
                                ${itemsList.join('<br>')}
                            </div>
                        </div>
                        ${warningText}
                        <div class="form-group">
                            <label>删除统计：</label>
                            <div style="padding: 8px; background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 4px; margin-top: 5px;">
                                • 节点：${totalNodeCount} 个<br>
                                • 关系：${totalRelationshipCount} 个<br>
                                • 总计：${totalNodeCount + totalRelationshipCount} 个项目
                            </div>
                        </div>
                        <div class="form-actions">
                            <button class="action-btn danger-btn" onclick="confirmDelete()">删除</button>
                            <button class="action-btn cancel-btn" onclick="clearRecentNodes(); updateDeleteFormContent()">清空已选</button>
                        </div>
                    </div>
                `;
            }
        }

        // 确认删除函数
        async function confirmDelete() {
            if (recentSelectedNodes.length === 0) {
                alert('请先选择要删除的节点或关系');
                return;
            }
            
            // 计算将要删除的所有内容
            let totalNodeCount = 0;
            let totalRelationshipCount = 0;
            let itemDescriptions = [];
            
            recentSelectedNodes.forEach((item, index) => {
                if (item.type === 'node') {
                    totalNodeCount += 1;
                    const relatedCount = graphData.links.filter(link => 
                        link.source.id === item.data.id || link.target.id === item.data.id
                    ).length;
                    totalRelationshipCount += relatedCount;
                    itemDescriptions.push(`节点"${item.data.label}"（包含${relatedCount}个关系）`);
                } else if (item.type === 'relationship') {
                    totalRelationshipCount += 1;
                    const sourceNode = graphData.nodes.find(node => node.id === item.data.source.id);
                    const targetNode = graphData.nodes.find(node => node.id === item.data.target.id);
                    itemDescriptions.push(`关系"${item.data.type}" (从"${sourceNode ? sourceNode.label : 'Unknown'}"到"${targetNode ? targetNode.label : 'Unknown'}")`);
                }
            });
            
            // 构建确认删除消息
            let confirmMessage = `确认删除以下${recentSelectedNodes.length}个项目？\n\n`;
            confirmMessage += `删除列表：\n`;
            itemDescriptions.forEach((desc, index) => {
                confirmMessage += `${index + 1}. ${desc}\n`;
            });
            confirmMessage += `\n此操作将总共删除：\n`;
            if (totalNodeCount > 0) {
                confirmMessage += `• ${totalNodeCount} 个节点\n`;
            }
            if (totalRelationshipCount > 0) {
                confirmMessage += `• ${totalRelationshipCount} 个关系\n`;
            }
            confirmMessage += `\n此操作不可撤销，确定要继续吗？`;
            
            // 进行删除确认
            if (!confirm(confirmMessage)) {
                return;
            }
            
            try {
                // 显示加载状态
                const confirmBtn = document.querySelector('.danger-btn');
                const originalText = confirmBtn.textContent;
                confirmBtn.textContent = '删除中...';
                confirmBtn.disabled = true;
                
                // 收集所有要删除的元素ID
                const elementIds = recentSelectedNodes.map(item => item.data.neo4j_id);
                
                // 批量删除
                const response = await fetch('/api/delete_item', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        element_ids: elementIds
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 清空最近选择的项目
                    recentSelectedNodes = [];
                    // 隐藏编辑表单
                    hideEditForms();
                    // 隐藏详情面板
                    document.getElementById("node-details").style.display = "none";
                    
                    // 使用动态更新代替页面刷新
                    const updateSuccess = await updateGraphData();
                    
                    let resultMessage = `从云图删除完成！\n\n`;
                    resultMessage += `成功删除：${result.deleted_nodes || 0} 个节点，${result.deleted_relationships || 0} 个关系\n`;
                    
                    // 如果有失败的项目，显示详情
                    if (result.failed_items && result.failed_items.length > 0) {
                        resultMessage += `\n删除失败：${result.failed_items.length} 个项目\n\n失败项目：\n`;
                        result.failed_items.forEach(item => {
                            resultMessage += `- ID "${item.element_id}": ${item.error}\n`;
                        });
                    }
                    
                    if (updateSuccess) {
                        resultMessage += `\n图谱已自动更新显示最新数据。`;
                    } else {
                        resultMessage += `\n图谱数据更新失败，请手动刷新页面。`;
                    }

        // 确认节点修改函数
        async function confirmNodeModification() {
            const selectedItem = recentSelectedNodes[0];
            if (!selectedItem || (selectedItem.type !== 'node' && selectedItem.type !== 'relationship')) {
                alert('请先选择一个节点或关系进行修改');
                return;
            }
            
            // 如果是关系类型，单独处理
            if (selectedItem.type === 'relationship') {
                const item = selectedItem.data;
                
                const relationshipNameInput = document.getElementById('edit-relationship-name');
                const relationshipConfidenceInput = document.getElementById('edit-relationship-confidence');
                const relationshipImportanceInput = document.getElementById('edit-relationship-importance');
                const relationshipSourceInput = document.getElementById('edit-relationship-source');
                const relationshipEvidenceInput = document.getElementById('edit-relationship-evidence');
                const relationshipDirectionInput = document.getElementById('edit-relationship-direction');
                
                if (!relationshipNameInput || !relationshipNameInput.value.trim()) {
                    alert('关系名称不能为空');
                    return;
                }
                
                const newRelationshipName = relationshipNameInput.value.trim();
                const modifiedProperties = {};
                
                if (relationshipConfidenceInput && relationshipConfidenceInput.value.trim()) {
                    const confidence = parseFloat(relationshipConfidenceInput.value.trim());
                    if (!isNaN(confidence) && confidence >= 0 && confidence <= 1) {
                        modifiedProperties['confidence'] = confidence;
                    } else {
                        alert('置信度必须在0-1之间');
                        return;
                    }
                }
                
                if (relationshipImportanceInput && relationshipImportanceInput.value.trim()) {
                    const importance = parseFloat(relationshipImportanceInput.value.trim());
                    if (!isNaN(importance) && importance >= 0 && importance <= 1) {
                        modifiedProperties['importance'] = importance;
                    } else {
                        alert('重要性必须在0-1之间');
                        return;
                    }
                }
                
                if (relationshipSourceInput && relationshipSourceInput.value.trim()) {
                    modifiedProperties['source'] = relationshipSourceInput.value.trim();
                } else {
                    // 如果没有填写source，使用默认值
                    modifiedProperties['source'] = 'manual_input';
                }
                
                if (relationshipEvidenceInput) {
                    modifiedProperties['evidence'] = relationshipEvidenceInput.value.trim() || selectedItem.data.properties.evidence || '';
                } else {
                    modifiedProperties['evidence'] = selectedItem.data.properties.evidence || '';
                }
                
                const direction = relationshipDirectionInput ? relationshipDirectionInput.value : 'to_endNode';
                
                // 获取节点信息用于后续反馈
                const sourceNode = graphData.nodes.find(node => node.id === selectedItem.data.source.id);
                const targetNode = graphData.nodes.find(node => node.id === selectedItem.data.target.id);
                
                let directionText = '';
                if (direction === 'to_startNode') {
                    directionText = `${targetNode ? targetNode.label : 'Unknown'} → ${sourceNode ? sourceNode.label : 'Unknown'}`;
                } else if (direction === 'bidirectional') {
                    directionText = `${sourceNode ? sourceNode.label : 'Unknown'} ↔ ${targetNode ? targetNode.label : 'Unknown'}`;
                } else {
                    directionText = `${sourceNode ? sourceNode.label : 'Unknown'} → ${targetNode ? targetNode.label : 'Unknown'}`;
                }
                
                try {
                    // 显示加载状态
                    const confirmBtn = document.querySelector('.primary-btn');
                    const originalText = confirmBtn.textContent;
                    confirmBtn.textContent = '修改中...';
                    confirmBtn.disabled = true;
                    
                    // 调用关系修改API
                    const response = await fetch('/api/modify_relation', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',

                        body: JSON.stringify({
                            relation_id: selectedItem.data.neo4j_id,
                            predicate: newRelationshipName,
                            source: modifiedProperties.source || 'neo4j',
                            confidence: modifiedProperties.confidence || 0.75,
                            importance: modifiedProperties.importance,
                            directivity: direction,
                            evidence: modifiedProperties.evidence || ''
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        // 隐藏编辑表单

                        document.getElementById("node-details").style.display = "none";

        async function confirmCollide() {
            if (recentSelectedNodes.length < 2) {
                alert('请先选择两个节点进行合并');
                return;
            }
            
            const direction = document.getElementById('collide-direction').value;
            const n1 = recentSelectedNodes[1].data;
            const n2 = recentSelectedNodes[0].data;
            // node_id_1 = 保留节点, node_id_2 = 被删除节点
            const keepNode = direction === '2to1' ? n1 : n2;
            const mergeNode = direction === '2to1' ? n2 : n1;
            
            const confirmMessage = `确认合并节点？\n\n保留节点：${keepNode.label} (${keepNode.labels.join(", ")})\n合并节点：${mergeNode.label} (${mergeNode.labels.join(", ")})\n\n「${mergeNode.label}」上的所有关系将迁移至「${keepNode.label}」，「${mergeNode.label}」将被删除。\n\n此操作不可撤销，确定要继续吗？`;
            
            if (!confirm(confirmMessage)) {
                return;
            }
            
            try {
                const confirmBtn = document.querySelector('.danger-btn');
                const originalText = confirmBtn.textContent;
                confirmBtn.textContent = '合并中...';
                confirmBtn.disabled = true;
                
                const response = await fetch('/api/collide_nodes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        node_id_1: keepNode.neo4j_id,
                        node_id_2: mergeNode.neo4j_id
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    recentSelectedNodes = [];
                    hideEditForms();
                    document.getElementById("node-details").style.display = "none";
                    
                    const updateSuccess = await updateGraphData();
                    if (updateSuccess) {
                        alert(`合并成功！\n\n「${mergeNode.label}」已合并到「${keepNode.label}」\n图谱已自动更新。`);
                    } else {
                        alert(`合并成功！\n\n「${mergeNode.label}」已合并到「${keepNode.label}」\n图谱数据更新失败，请手动刷新页面。`);
                    }
                } else {
                    alert(`合并失败：${result.error || '未知错误'}`);
                }
                
            } catch (error) {
                console.error('合并操作失败:', error);
                alert(`合并操作失败：${error.message}`);
            } finally {
                const confirmBtn = document.querySelector('.danger-btn');
                if (confirmBtn) {
                    confirmBtn.textContent = '确认合并';
                    confirmBtn.disabled = false;
                }
            }
        }

        function updateVisualization() {
            // 更新节点选择列表
            updateNodeSelectionLists();
            
            // 处理双向关系
            detectBidirectionalLinks(graphData.links);
            
            // 更新力导向图数据
            simulation.nodes(graphData.nodes);
            simulation.force("link").links(graphData.links);
            
            // 重新绑定并更新节点
            node = node.data(graphData.nodes, d => d.id);
            node.exit().remove();
            node = node.enter().append("circle")
                .attr("class", "node")
                .attr("r", d => d.size)
                .attr("fill", d => d.color)
                .attr("stroke", NODE_STROKE_COLOR)
                .attr("stroke-width", NODE_STROKE_WIDTH)
                .on("click", showNodeDetails)
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended))
                .merge(node);
            
            // 更新所有节点的属性（包括现有的）
            node.attr("r", d => d.size)
                .attr("fill", d => d.color)
                .attr("stroke", NODE_STROKE_COLOR)
                .attr("stroke-width", NODE_STROKE_WIDTH);
            
            // 重新绑定并更新链接
            link = link.data(graphData.links, d => d.neo4j_id || d.id);
            link.exit().remove();
            link = link.enter().append("line")
                .attr("class", "link")
                .attr("marker-end", "url(#arrow)")
                .attr("stroke", LINK_COLOR)
                .attr("stroke-width", "3")
                .on("click", showLinkDetails)
                .merge(link);
            
            // 更新所有链接的颜色（包括现有的）
            link.attr("stroke", LINK_COLOR)
                .attr("marker-end", "url(#arrow)");
            
            // 重新绑定并更新节点标签
            nodeLabels = nodeLabels.data(graphData.nodes, d => d.id);
            nodeLabels.exit().remove();
            nodeLabels = nodeLabels.enter().append("text")
                .attr("class", "node-label")
                .text(d => d.label.length > 8 ? d.label.substring(0, 8) + "..." : d.label)
                .style("display", "block")
                .merge(nodeLabels);
            
            // 更新所有节点标签的文本内容（包括现有的）
            nodeLabels.text(d => d.label.length > 8 ? d.label.substring(0, 8) + "..." : d.label);
            
            // 重新绑定并更新链接标签
            linkLabels = linkLabels.data(graphData.links, d => d.neo4j_id || d.id);
            linkLabels.exit().remove();
            linkLabels = linkLabels.enter().append("text")
                .attr("class", "link-label")
                .text(d => {
                    // 显示关系类型：优先显示predicate > action > type
                    if (d.properties && d.properties.predicate) {
                        return d.properties.predicate;
                    } else if (d.properties && d.properties.action) {
                        return d.properties.action;
                    } else {
                        return d.type;
                    }
                })
                .style("display", "block")
                .merge(linkLabels);
            
            // 更新现有标签的文本内容
            linkLabels.text(d => {
                // 显示关系类型：优先显示predicate > action > type
                if (d.properties && d.properties.predicate) {
                    return d.properties.predicate;
                } else if (d.properties && d.properties.action) {
                    return d.properties.action;
                } else {
                    return d.type;
                }
            });
            
            // 重新绑定并更新链接标签背景
            linkLabelBgs = linkLabelBgs.data(graphData.links, d => d.neo4j_id || d.id);
            linkLabelBgs.exit().remove();
            linkLabelBgs = linkLabelBgs.enter().append("rect")
                .attr("class", "link-label-bg")
                .attr("fill", "rgba(255,255,255,0.8)")
                .attr("stroke", "rgba(200,200,200,0.5)")
                .attr("stroke-width", 0.5)
                .attr("rx", 3)
                .attr("ry", 3)
                .merge(linkLabelBgs);
            
            // 应用当前的标签可见性状态
            nodeLabels.style("display", nodeLabelsVisible ? "block" : "none");
            linkLabels.style("display", linkLabelsVisible ? "block" : "none");
            linkLabelBgs.style("display", linkLabelsVisible ? "block" : "none");
            
            // 重新启动仿真
            simulation.alpha(1).restart();
        }
        
        // 初始化
        initStats();
        initEditButtonState();
        
        // 初始化编辑按钮状态
        function initEditButtonState() {
            const editButton = document.getElementById('edit-button');

            console.log('🔍 Neo4j连接状态检查:', neo4jConnected);

                        </div>
                    </div>
                    <div class="form-actions">

            if (!saveBtn) return;
            const originalText = saveBtn.textContent;
            saveBtn.textContent = '保存中...';
            saveBtn.disabled = true;

            try {
                // 收集全部节点ID
                let nodeIds = graphData.nodes.map(n => n.neo4j_id);

                // 收集全部关系ID
                let relationIds = graphData.links.map(l => l.neo4j_id);

                console.log('记忆快照保存请求:', { nodes_ids: nodeIds, relation_ids: relationIds });

                const response = await fetch('/api/save_memory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nodes_ids: nodeIds,
                        relation_ids: relationIds

                });

                    const memoryForms = document.querySelector('.memory-forms');

                        <div class="edit-form">
                            <div style="padding: 15px; background: #d4edda; border: 1px solid #c3e6cb; border-radius: 6px; text-align: center;">
                                <div style="font-size: 32px; margin-bottom: 8px;">✅</div>
                                <div style="font-weight: 600; color: #155724; font-size: 16px; margin-bottom: 6px;">快照保存成功</div>

                                <div style="color: #155724; font-size: 12px; margin-top: 4px;">已保存至日志文件</div>
                            </div>
                        </div>
                    `;

                    saveBtn.textContent = originalText;
                    saveBtn.disabled = false;
                }

                console.error('快照保存失败:', error);
                alert('❌ 快照保存失败：' + error.message);
                saveBtn.textContent = originalText;
                saveBtn.disabled = false;

        // 读取记忆快照
        async function loadMemorySnapshot() {
            const memoryForms = document.querySelector('.memory-forms');
            memoryForms.innerHTML = `
                <div class="edit-form">
                    <h4>📂 读取记忆快照</h4>
                    <div style="padding: 12px; background: #e8f4fd; border-radius: 6px; border: 1px solid #bee5eb; margin-bottom: 15px;">
                        <div style="color: #0c5460; font-size: 14px; line-height: 1.6;">
                            从快照列表中选择，或从本地选择文件导入到记忆图谱中。
                        </div>
                    </div>
                    <div id="snapshot-file-list" style="margin-bottom: 12px;">
                        <div style="text-align: center; padding: 10px; color: #888;">加载快照列表中...</div>
                    </div>
                    <div style="margin-bottom: 12px;">
                        <label style="font-weight: 600; font-size: 13px; display: block; margin-bottom: 6px;">或从本地选择文件：</label>

                        <div id="snapshot-file-chosen" style="display: flex; align-items: center; gap: 8px;">
                            <button onclick="document.getElementById('snapshot-file-input').click()" 
                                style="padding: 8px 14px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.2s;"
                                onmouseover="this.style.background='#e9ecef'" onmouseout="this.style.background='#f8f9fa'">📁 选择文件</button>
                            <span id="snapshot-file-name" style="font-size: 13px; color: #888;">未选择文件</span>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button class="action-btn primary-btn" id="load-snapshot-btn" onclick="confirmLoadSnapshot()">确认导入</button>
                        <button class="action-btn cancel-btn" onclick="document.querySelector('.memory-forms').innerHTML=''">取消</button>
                    </div>
                </div>
            `;

            // 获取可用快照文件列表
            try {
                const response = await fetch('/api/list_memory_snapshots');
                const result = await response.json();
                const listDiv = document.getElementById('snapshot-file-list');

                if (result.success && result.files.length > 0) {
                    let html = '<div style="font-weight: 600; font-size: 13px; margin-bottom: 6px;">可用快照文件：</div>';
                    html += '<div style="max-height: 180px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 6px;">';
                    result.files.forEach((file, index) => {
                        html += `
                            <div class="snapshot-file-item" onclick="selectSnapshotFile('${file.path.replace(/\\/g, '\\\\')}')" 
                                style="padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s;"
                                onmouseover="this.style.background='#e8f4fd'" onmouseout="this.style.background='transparent'">

                    listDiv.innerHTML = '<div style="padding: 10px; color: #888; font-size: 13px; text-align: center;">暂无快照文件，请从本地选择文件</div>';

        // 选择快照文件（从列表中选择，使用服务端路径）
        let _selectedSnapshotPath = null;
        let _selectedSnapshotFile = null;

        function selectSnapshotFile(filePath) {
            _selectedSnapshotPath = filePath;
            _selectedSnapshotFile = null;
            // 清除文件选择器状态
            document.getElementById('snapshot-file-input').value = '';
            document.getElementById('snapshot-file-name').textContent = '未选择文件';
            document.getElementById('snapshot-file-name').style.color = '#888';
            // 高亮选中项
            document.querySelectorAll('.snapshot-file-item').forEach(item => {
                item.style.background = 'transparent';
                item.style.fontWeight = 'normal';
            });
            event.currentTarget.style.background = '#d4edda';
            event.currentTarget.style.fontWeight = '600';
        }

        // 通过系统文件选择器选择文件
        function onSnapshotFileSelected(input) {
            if (input.files && input.files[0]) {
                _selectedSnapshotFile = input.files[0];
                _selectedSnapshotPath = null;
                document.getElementById('snapshot-file-name').textContent = input.files[0].name;
                document.getElementById('snapshot-file-name').style.color = '#155724';
                // 取消列表高亮
                document.querySelectorAll('.snapshot-file-item').forEach(item => {
                    item.style.background = 'transparent';
                    item.style.fontWeight = 'normal';
                });
            }
        }

        // 确认导入快照
        async function confirmLoadSnapshot() {
            if (!_selectedSnapshotPath && !_selectedSnapshotFile) {
                alert('请从列表中选择快照或通过文件选择器选择文件');
                return;
            }

            const loadBtn = document.getElementById('load-snapshot-btn');
            const originalText = loadBtn.textContent;
            loadBtn.textContent = '导入中...';
            loadBtn.disabled = true;

            try {
                let response;

                if (_selectedSnapshotPath) {
                    // 从快照列表选择的，使用服务端文件路径
                    response = await fetch('/api/upload_memory', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ file_path: _selectedSnapshotPath })
                    });
                } else {
                    // 从文件选择器选择的，读取内容后上传
                    const fileContent = await _selectedSnapshotFile.text();
                    const memoryData = JSON.parse(fileContent);
                    response = await fetch('/api/upload_memory_content', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(memoryData)
                    });
                }

                const result = await response.json();

                if (result.success) {
                    const memoryForms = document.querySelector('.memory-forms');
                    memoryForms.innerHTML = `
                        <div class="edit-form">
                            <div style="padding: 15px; background: #d4edda; border: 1px solid #c3e6cb; border-radius: 6px; text-align: center;">
                                <div style="font-size: 32px; margin-bottom: 8px;">✅</div>
                                <div style="font-weight: 600; color: #155724; font-size: 16px; margin-bottom: 6px;">记忆导入成功</div>
                                <div style="color: #155724; font-size: 13px;">${result.message || '记忆已成功加载到图谱中'}</div>
                            </div>
                        </div>
                    `;
                    _selectedSnapshotPath = null;
                    _selectedSnapshotFile = null;
                    smartRefresh();
                } else {
                    alert('❌ 导入失败: ' + (result.error || '未知错误'));
                    loadBtn.textContent = originalText;
                    loadBtn.disabled = false;
                }
            } catch (error) {
                console.error('导入快照失败:', error);
                if (error instanceof SyntaxError) {
                    alert('❌ 导入失败：文件不是有效的JSON格式');
                } else {
                    alert('❌ 导入失败：' + error.message);
                }
                loadBtn.textContent = originalText;
                loadBtn.disabled = false;
            }
        }

        // 修改toggleEditPanel函数，增加连接状态检查
        function toggleEditPanel() {
            console.log('🔄 toggleEditPanel被调用');
            console.log('🔍 当前Neo4j连接状态:', graphData.neo4j_connected);
            
            if (!graphData.neo4j_connected) {
                console.log('❌ Neo4j未连接，阻止面板打开');
                alert('Neo4j数据库未连接，无法进行节点编辑操作。');
                return;
            }
            
            console.log('✅ Neo4j已连接，切换编辑面板');
            const panel = document.getElementById('edit-panel');
            // 关闭记忆面板（如果打开的话）
            const memoryPanel = document.getElementById('memory-panel');
            if (memoryPanel.classList.contains('show')) {
                memoryPanel.classList.remove('show');
            }
            panel.classList.toggle('show');
            
            // 如果关闭面板，退出编辑子模式（删除模式、保存模式等）

        // 客户端生命周期管理
        let heartbeatInterval = null;
        let disconnectSent = false; // 防止重复发送断开连接通知
        
        // 启动心跳
        function startHeartbeat() {
            // 立即发送一次心跳
            sendHeartbeat();
            
            // 每60秒发送一次心跳
            heartbeatInterval = setInterval(sendHeartbeat, 60000);
        }
        
        // 发送心跳
        function sendHeartbeat() {
            fetch('/api/heartbeat', {
                method: 'GET'
            }).catch(error => {
                console.log('心跳发送失败:', error);
            });
        }
        

        
        // 通知服务器客户端断开连接
        function notifyDisconnect() {
            // 防止重复发送断开连接通知
            if (disconnectSent) {
                return;
            }
            disconnectSent = true;
            
            console.log('发送断开连接通知');
            
            // 停止心跳（如果正在运行）
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            
            const payload = JSON.stringify({
                action: 'disconnect',
                timestamp: Date.now()
            });
            
            // 优先使用同步请求（更可靠，尤其在浏览器关闭时）
            try {
                console.log('使用同步XMLHttpRequest发送断开连接通知');
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/disconnect', false); // 同步请求
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.timeout = 1000; // 1秒超时
                xhr.send(payload);
                console.log('同步请求发送完成，状态:', xhr.status);
            } catch (error) {
                console.warn('同步请求失败，尝试sendBeacon:', error);
                // 备用方案：sendBeacon
                if (navigator.sendBeacon) {
                    const blob = new Blob([payload], { type: 'application/json' });
                    const success = navigator.sendBeacon('/api/disconnect', blob);
                    console.log('sendBeacon备用结果:', success);
                }
            }
        }
        
        // 页面加载完成后启动心跳
        document.addEventListener('DOMContentLoaded', function() {
            startHeartbeat();
        });
        
        // 页面关闭检测机制（针对Chrome浏览器直接关闭的问题）
        
        // 1. beforeunload - 主要方法
        window.addEventListener('beforeunload', function(event) {
            console.log('beforeunload事件触发');
            notifyDisconnect();
        });
        
        // 2. unload - 备用方法
        window.addEventListener('unload', function(event) {
            console.log('unload事件触发');
            notifyDisconnect();
        });
        
        // 3. pagehide - 仅在页面真正被卸载时触发（不是被缓存）
        window.addEventListener('pagehide', function(event) {
            console.log('pagehide事件触发，persisted:', event.persisted);
            // 只有在页面真正被卸载（不是被缓存）时才发送断开连接通知
            if (!event.persisted) {
                notifyDisconnect();
            }
        });
        
    </script>
